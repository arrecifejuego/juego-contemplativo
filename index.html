<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Simulación — Arrecife</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet"/>
<style>
:root{
  --cyan:rgba(100,210,230,1);--cyan-dim:rgba(100,210,230,0.18);
  --algas:rgba(80,200,160,1);--algas-dim:rgba(80,200,160,0.15);
  --corales:rgba(220,120,90,1);--corales-dim:rgba(220,120,90,0.15);
  --bg:#050a0d;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;background:var(--bg);color:white;overflow-x:hidden;}
body{font-family:'Tenor Sans',sans-serif;}

/* CANVAS FONDO */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* OCEANO */
.ocean{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none;}
.wave{position:absolute;width:200%;height:200%;left:-50%;top:-50%;
  background:radial-gradient(circle at center,rgba(80,180,200,0.035),transparent 60%);
  animation:rotateWave 55s linear infinite;}
.wave2{animation-duration:85s;opacity:0.5;transform:scale(1.25);}
.wave3{animation-duration:120s;opacity:0.2;transform:scale(1.45);}
@keyframes rotateWave{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* LAYOUT */
.container{max-width:1100px;margin:0 auto;padding:60px 24px 100px;position:relative;z-index:2;}

/* HEADER */
.header{text-align:center;margin-bottom:64px;}
.logo{font-family:'Tenor Sans',sans-serif;letter-spacing:10px;font-size:10px;opacity:0.3;margin-bottom:28px;text-transform:uppercase;}
h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:48px;letter-spacing:2px;margin-bottom:12px;}
.sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;opacity:0.35;line-height:1.8;}

/* CONTROLES */
.controls-row{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:52px;}
.select-wrap{position:relative;}
.select-wrap::after{content:'↓';position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:10px;opacity:0.4;pointer-events:none;}
select{
  appearance:none;-webkit-appearance:none;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.1);
  color:white;padding:11px 36px 11px 16px;
  font-family:'Tenor Sans',sans-serif;
  font-size:11px;letter-spacing:2px;
  cursor:pointer;border-radius:2px;
  transition:border-color 0.3s,box-shadow 0.3s;
  text-transform:uppercase;
}
select option{background:#0a1520;color:white;}
select:hover,select:focus{outline:none;border-color:rgba(100,210,230,0.4);box-shadow:0 0 16px rgba(100,210,230,0.08);}

/* GRID JUGADORES */
.players-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:16px;margin-bottom:48px;}

/* CARTA JUGADOR */
.player-card{
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.02);
  padding:20px 16px 22px;
  position:relative;overflow:hidden;
  transition:border-color 0.4s,box-shadow 0.4s;
  backdrop-filter:blur(4px);
  cursor:pointer;
}
.player-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(100,210,230,0.2),transparent);
  opacity:0;transition:opacity 0.4s;
}
.player-card:hover::before{opacity:1;}
.player-card:hover{border-color:rgba(100,210,230,0.2);box-shadow:0 0 24px rgba(100,210,230,0.05);}
.player-card.team-algas{border-color:rgba(80,200,160,0.25);box-shadow:0 0 20px rgba(80,200,160,0.06);}
.player-card.team-corales{border-color:rgba(220,120,90,0.25);box-shadow:0 0 20px rgba(220,120,90,0.06);}
.player-num{font-size:9px;letter-spacing:4px;opacity:0.3;margin-bottom:18px;text-transform:uppercase;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:9px;letter-spacing:2.5px;opacity:0.3;margin-bottom:7px;text-transform:uppercase;}
.field select{width:100%;padding:9px 28px 9px 10px;font-size:12px;letter-spacing:1px;}

/* CARTA VISUAL */
.carta-visual{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:16px 10px;min-height:110px;
  border:1px solid rgba(255,255,255,0.08);border-radius:2px;
  background:rgba(0,0,0,0.3);position:relative;overflow:hidden;
  transform:rotateY(90deg);transition:transform 0.5s ease;
}
.carta-visual.flipped{transform:rotateY(0deg);}
.carta-visual.team-algas{border-color:rgba(80,200,160,0.35);background:rgba(80,200,160,0.06);}
.carta-visual.team-corales{border-color:rgba(220,120,90,0.35);background:rgba(220,120,90,0.06);}
.carta-equipo{font-size:9px;letter-spacing:3px;opacity:0.5;text-transform:uppercase;}
.carta-numero{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;line-height:1;}
.carta-signo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;opacity:0.6;position:absolute;top:8px;right:10px;}
.carta-aporte{font-size:10px;letter-spacing:1px;opacity:0.4;}

/* BOTÓN ANALIZAR */
.btn-analizar{
  display:block;margin:0 auto;
  background:transparent;border:1px solid rgba(255,255,255,0.2);color:white;
  padding:14px 48px;font-family:'Tenor Sans',sans-serif;
  font-size:11px;letter-spacing:4px;cursor:pointer;text-transform:uppercase;
  transition:border-color 0.3s,box-shadow 0.3s,background 0.3s,color 0.3s;
  position:relative;overflow:hidden;
}
.btn-analizar::before{content:'';position:absolute;inset:0;background:rgba(100,210,230,0.07);opacity:0;transition:opacity 0.3s;}
.btn-analizar:hover::before{opacity:1;}
.btn-analizar:hover{border-color:rgba(100,210,230,0.45);box-shadow:0 0 28px rgba(100,210,230,0.1);}
.btn-analizar:active{transform:scale(0.98);}

/* ZONA RESOLUCIÓN */
#zona-resolucion{margin-top:72px;max-width:720px;margin-left:auto;margin-right:auto;}

/* PASOS */
.paso-bloque{opacity:0;transform:translateY(18px);transition:opacity 0.7s ease,transform 0.7s ease;margin-bottom:0;}
.paso-bloque.visible{opacity:1;transform:translateY(0);}
.paso-linea{width:1px;height:48px;background:linear-gradient(to bottom,rgba(100,210,230,0.25),transparent);margin:0 auto;}
.paso-label{font-size:9px;letter-spacing:4px;opacity:0.3;text-align:center;margin-bottom:20px;text-transform:uppercase;}

/* EQUIPOS */
.equipos-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.equipo-bloque{flex:1;min-width:160px;max-width:260px;border:1px solid rgba(255,255,255,0.08);padding:20px 16px;text-align:center;position:relative;}
.equipo-bloque.mayoria{border-color:rgba(100,210,230,0.25);background:rgba(100,210,230,0.04);}
.equipo-bloque.minoria{border-color:rgba(255,255,255,0.06);background:rgba(255,255,255,0.01);}
.equipo-tag{font-size:9px;letter-spacing:3px;opacity:0.35;margin-bottom:10px;text-transform:uppercase;}
.equipo-nombre{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;margin-bottom:6px;}
.equipo-nombre.algas{color:var(--algas);}
.equipo-nombre.corales{color:var(--corales);}
.equipo-count{font-size:11px;opacity:0.35;letter-spacing:1px;}
.amuleto-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;padding:3px 10px;background:rgba(255,220,80,0.12);border:1px solid rgba(255,220,80,0.3);color:rgba(255,220,80,0.8);white-space:nowrap;text-transform:uppercase;}

/* SUMAS */
.sumas-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.suma-bloque{flex:1;min-width:160px;max-width:260px;border:1px solid rgba(255,255,255,0.06);padding:20px 16px;text-align:center;background:rgba(255,255,255,0.01);}
.suma-tag{font-size:9px;letter-spacing:3px;opacity:0.3;margin-bottom:10px;text-transform:uppercase;}
.suma-val{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;line-height:1;margin-bottom:6px;}
.suma-abs{font-size:10px;opacity:0.3;letter-spacing:1px;}

/* ANÁLISIS */
.analisis-texto{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;font-weight:300;line-height:1.9;text-align:center;opacity:0.75;padding:0 16px;}
.analisis-texto span{opacity:0.4;font-size:14px;}

/* EVENTOS */
.evento-especial{text-align:center;padding:32px 28px;border:1px solid rgba(100,210,230,0.2);background:rgba(100,210,230,0.04);position:relative;overflow:hidden;}
.evento-especial::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(100,210,230,0.06),transparent);animation:shimmer 2.5s ease-in-out infinite;}
@keyframes shimmer{to{left:100%;}}
.evento-especial.tornado{border-color:rgba(180,80,80,0.3);background:rgba(180,80,80,0.04);}
.evento-especial.tornado::before{background:linear-gradient(90deg,transparent,rgba(180,80,80,0.06),transparent);}
.evento-especial.marea{border-color:rgba(80,180,220,0.3);background:rgba(80,180,220,0.04);}
.evento-nombre{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:6px;opacity:0.5;margin-bottom:14px;text-transform:uppercase;}
.evento-desc{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;font-weight:300;line-height:1.7;}

/* RESULTADO FINAL */
.resultado-final{text-align:center;padding:36px 28px;}
.resultado-tag{font-size:9px;letter-spacing:4px;opacity:0.3;margin-bottom:20px;text-transform:uppercase;}
.resultado-daño{font-family:'Cormorant Garamond',serif;font-size:58px;font-weight:300;line-height:1;margin-bottom:12px;text-shadow:0 0 40px rgba(100,210,230,0.3);}
.resultado-daño.algas{color:var(--algas);text-shadow:0 0 40px rgba(80,200,160,0.3);}
.resultado-daño.corales{color:var(--corales);text-shadow:0 0 40px rgba(220,120,90,0.3);}
.resultado-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;opacity:0.4;letter-spacing:1px;}
.resultado-recupera{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:300;line-height:1;margin-bottom:10px;color:rgba(80,180,220,0.9);}

/* BOTÓN SIGUIENTE */
.btn-siguiente{
  display:block;margin:40px auto 0;
  background:transparent;border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.5);padding:12px 40px;
  font-family:'Tenor Sans',sans-serif;font-size:10px;letter-spacing:3px;
  cursor:pointer;text-transform:uppercase;transition:all 0.3s;
}
.btn-siguiente:hover{border-color:rgba(100,210,230,0.35);color:white;box-shadow:0 0 20px rgba(100,210,230,0.08);}
.btn-siguiente:active{transform:scale(0.98);}

/* SPARK */
.spark{position:fixed;pointer-events:none;z-index:9999;width:4px;height:4px;border-radius:50%;background:rgba(100,210,230,0.9);box-shadow:0 0 8px rgba(100,210,230,0.8);}

@media(max-width:600px){
  h1{font-size:36px;}
  .players-grid{grid-template-columns:repeat(auto-fit,minmax(130px,1fr));}
  .suma-val{font-size:40px;}
  .resultado-daño{font-size:44px;}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="ocean">
  <div class="wave"></div><div class="wave wave2"></div><div class="wave wave3"></div>
</div>

<div class="container">
  <div class="header">
    <div class="logo">Arrecife</div>
    <h1>Simulación</h1>
    <div class="sub">Observá qué ocurre cuando el grupo se divide.</div>
  </div>

  <div class="controls-row">
    <div class="select-wrap">
      <select id="cantidadJugadores">
        <option value="3">3 jugadores</option>
        <option value="4">4 jugadores</option>
        <option value="5" selected>5 jugadores</option>
        <option value="6">6 jugadores</option>
        <option value="7">7 jugadores</option>
      </select>
    </div>
    <div class="select-wrap">
      <select id="amuleto">
        <option value="Algas">Amuleto → Algas</option>
        <option value="Corales">Amuleto → Corales</option>
      </select>
    </div>
  </div>

  <div class="players-grid" id="playersContainer"></div>
  <button class="btn-analizar" id="btnAnalizar">Revelar ronda</button>
  <div id="zona-resolucion"></div>
</div>

<script>
/* ============================
   CANVAS — FONDO CON ONDAS
============================ */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;
const bgRipples = [];

function resizeCanvas(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function addBgRipple(x, y, color){
  bgRipples.push({x, y, r:0, alpha:0.6, speed:2.5+Math.random(), color: color||'100,210,230'});
  setTimeout(()=>{
    bgRipples.push({x, y, r:0, alpha:0.3, speed:1.8+Math.random()*0.5, color: color||'100,210,230'});
  }, 120);
}

// ondas expansivas en cualquier click de la página
document.addEventListener('click', e=>{
  addBgRipple(e.clientX, e.clientY);
});
document.addEventListener('touchstart', e=>{
  addBgRipple(e.touches[0].clientX, e.touches[0].clientY);
}, {passive:true});

function bgLoop(){
  requestAnimationFrame(bgLoop);
  ctx.clearRect(0,0,W,H);

  // fondo gradiente oceánico
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#010d14');
  grad.addColorStop(0.5,'#020f18');
  grad.addColorStop(1,'#000608');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // luz suave desde arriba
  const luz = ctx.createRadialGradient(W*0.5,-H*0.1,0,W*0.5,H*0.3,W*0.65);
  luz.addColorStop(0,'rgba(40,100,140,0.06)');
  luz.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=luz; ctx.fillRect(0,0,W,H);

  // ondas expansivas
  for(let i=bgRipples.length-1;i>=0;i--){
    const r=bgRipples[i];
    r.r += r.speed;
    r.alpha -= 0.004;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${r.color},${r.alpha*0.25})`;
    ctx.lineWidth = 1.2;
    ctx.stroke();
    if(r.alpha<=0) bgRipples.splice(i,1);
  }
}
bgLoop();

/* ============================
   AUDIO
============================ */
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function playTone(freq,dur,type,vol,delay=0){
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  const now=audioCtx.currentTime+delay;
  osc.type=type; osc.frequency.value=freq;
  gain.gain.setValueAtTime(0,now);
  gain.gain.linearRampToValueAtTime(vol,now+0.03);
  gain.gain.exponentialRampToValueAtTime(0.0001,now+dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(now); osc.stop(now+dur);
}

// Sonido por tipo de select — graves, profundos
function sonarEquipo(){
  // grave cálido — como una corriente
  playTone(80,0.6,'sine',0.015);
  playTone(120,0.4,'sine',0.008,0.05);
}
function sonarSigno(){
  // tono medio — como una burbuja
  playTone(280,0.25,'sine',0.012);
  playTone(420,0.15,'sine',0.005,0.06);
}
function sonarValor(){
  // cristalino — como agua cayendo
  playTone(520,0.2,'triangle',0.01);
  playTone(780,0.15,'sine',0.005,0.04);
}
function sonarCantidad(){
  playTone(160,0.4,'sine',0.012);
  playTone(240,0.3,'sine',0.006,0.08);
}
function sonarReveal(){
  playTone(280,0.18,'sine',0.02);
  playTone(420,0.25,'sine',0.012,0.12);
  playTone(560,0.3,'sine',0.006,0.26);
}
function sonarCartaFlip(equipo, index){
  const base = equipo==='Algas' ? 340 : 260;
  setTimeout(()=>{
    playTone(base,0.2,'sine',0.015);
    playTone(base*1.5,0.15,'triangle',0.006,0.06);
  }, index*80);
}
function sonarPaso(){
  playTone(320,0.12,'sine',0.014);
}
function sonarTornado(){
  playTone(90,0.6,'sawtooth',0.018);
  playTone(60,0.8,'triangle',0.012,0.15);
  playTone(120,0.5,'sawtooth',0.008,0.3);
  // ondas rojas en el fondo
  const cx=W/2, cy=H/2;
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      addBgRipple(cx+(Math.random()-0.5)*200, cy+(Math.random()-0.5)*200, '200,80,80');
    }, i*100);
  }
}
function sonarMarea(){
  playTone(480,1,'sine',0.018);
  playTone(640,1.2,'sine',0.01,0.18);
  playTone(820,1,'sine',0.006,0.4);
  // onda azul grande y lenta desde el centro
  bgRipples.push({x:W/2, y:H/2, r:0, alpha:0.8, speed:4, color:'80,180,220'});
  bgRipples.push({x:W/2, y:H/2, r:0, alpha:0.5, speed:2.5, color:'80,180,220'});
}
function sonarFinal(){
  playTone(440,0.35,'sine',0.025);
  playTone(660,0.45,'sine',0.015,0.2);
  playTone(880,0.4,'sine',0.007,0.42);
}

/* ============================
   SPARKS
============================ */
function sparks(x, y, color){
  const c = color||'100,210,230';
  for(let i=0;i<6;i++){
    const s=document.createElement('div');
    s.className='spark';
    s.style.left=x+'px'; s.style.top=y+'px';
    s.style.background=`rgba(${c},0.9)`;
    s.style.boxShadow=`0 0 8px rgba(${c},0.8)`;
    document.body.appendChild(s);
    const angle=Math.random()*Math.PI*2;
    const dist=15+Math.random()*28;
    s.animate([
      {transform:'translate(-50%,-50%) translate(0,0) scale(1)',opacity:1},
      {transform:`translate(-50%,-50%) translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(0)`,opacity:0}
    ],{duration:400+Math.random()*200,easing:'ease-out'});
    setTimeout(()=>s.remove(),600);
  }
}

/* ============================
   JUGADORES
============================ */
const playersContainer = document.getElementById('playersContainer');
const cantidadSelect = document.getElementById('cantidadJugadores');

function maxValor(n){ return n<=4?4:5; }

function crearJugadores(){
  playersContainer.innerHTML='';
  const n=parseInt(cantidadSelect.value);
  const max=maxValor(n);
  for(let i=1;i<=n;i++){
    const card=document.createElement('div');
    card.className='player-card';
    card.innerHTML=`
      <div class="player-num">Jugador ${i}</div>
      <div class="field"><label>Equipo</label>
        <select class="sel-equipo">
          <option value="Algas">Algas</option>
          <option value="Corales">Corales</option>
        </select>
      </div>
      <div class="field"><label>Signo</label>
        <select class="sel-signo">
          <option value="+">+</option>
          <option value="-">−</option>
        </select>
      </div>
      <div class="field"><label>Valor</label>
        <select class="sel-valor">
          ${Array.from({length:max},(_,k)=>`<option value="${k+1}">${k+1}</option>`).join('')}
        </select>
      </div>
    `;

    // color dinámico + sonido por tipo
    const equipoSel=card.querySelector('.sel-equipo');
    const signoSel=card.querySelector('.sel-signo');
    const valorSel=card.querySelector('.sel-valor');

    equipoSel.addEventListener('change', e=>{
      if(audioCtx.state==='suspended') audioCtx.resume();
      sonarEquipo();
      card.classList.remove('team-algas','team-corales');
      card.classList.add('team-'+equipoSel.value.toLowerCase());
      const r=card.getBoundingClientRect();
      addBgRipple(r.left+r.width/2, r.top+r.height/2,
        equipoSel.value==='Algas'?'80,200,160':'220,120,90');
    });
    signoSel.addEventListener('change', ()=>{
      if(audioCtx.state==='suspended') audioCtx.resume();
      sonarSigno();
      const r=card.getBoundingClientRect();
      addBgRipple(r.left+r.width/2, r.top+r.height/2);
    });
    valorSel.addEventListener('change', ()=>{
      if(audioCtx.state==='suspended') audioCtx.resume();
      sonarValor();
      const r=card.getBoundingClientRect();
      addBgRipple(r.left+r.width/2, r.top+r.height/2);
    });

    playersContainer.appendChild(card);
  }
}

cantidadSelect.addEventListener('change',()=>{
  if(audioCtx.state==='suspended') audioCtx.resume();
  sonarCantidad();
  crearJugadores();
  document.getElementById('zona-resolucion').innerHTML='';
});
document.getElementById('amuleto').addEventListener('change',()=>{
  if(audioCtx.state==='suspended') audioCtx.resume();
  sonarEquipo();
});
crearJugadores();

/* ============================
   RESOLUCIÓN PASO A PASO
============================ */
let pasos=[], pasoActual=0;

function mostrarPaso(i){
  if(i>=pasos.length) return;
  requestAnimationFrame(()=>{ pasos[i].classList.add('visible'); });
}

function avanzar(){
  if(audioCtx.state==='suspended') audioCtx.resume();
  sonarPaso();
  pasoActual++;
  if(pasoActual<pasos.length){
    mostrarPaso(pasoActual);
    const btn=document.getElementById('btn-siguiente');
    if(btn){
      if(pasoActual===pasos.length-1){
        setTimeout(()=>{ pasos[pasoActual].scrollIntoView({behavior:'smooth',block:'center'}); },100);
        btn.style.display='none';
      } else {
        setTimeout(()=>{ pasos[pasoActual].scrollIntoView({behavior:'smooth',block:'center'}); },100);
        setTimeout(()=>{ btn.scrollIntoView({behavior:'smooth',block:'center'}); },450);
      }
    }
  }
}

function construirPasos(jugadores, mayoria, minoria, sumaMayoriaReal, sumaMinoriaReal, vivos, amuleto, tornado, marea, dañoFinal){
  const zona=document.getElementById('zona-resolucion');
  zona.innerHTML=''; pasos=[]; pasoActual=0;

  function addPaso(html){
    const div=document.createElement('div');
    div.className='paso-bloque';
    div.innerHTML=html;
    zona.appendChild(div);
    pasos.push(div);
    const sep=document.createElement('div');
    sep.className='paso-linea';
    sep.style.opacity='0';
    zona.appendChild(sep);
    setTimeout(()=>sep.style.opacity='1',800);
  }

  const sumaMayoria=Math.abs(sumaMayoriaReal);
  const sumaMinoria=Math.abs(sumaMinoriaReal);

  // ── PASO 1: Cartas con flip animado
  let cartasHTML=`<div class="paso-label">Las cartas</div><div class="players-grid" style="max-width:100%" id="cartas-reveal">`;
  jugadores.forEach((j,idx)=>{
    const equipo=j.equipo.toLowerCase();
    const aporteLabel=j.aporte>=0?`+${j.aporte}`:String(j.aporte);
    cartasHTML+=`
      <div style="text-align:center">
        <div style="font-size:9px;letter-spacing:3px;opacity:0.3;margin-bottom:8px;text-transform:uppercase">Jugador ${idx+1}</div>
        <div class="carta-visual team-${equipo}" id="carta-${idx}" style="display:flex">
          <div class="carta-signo">${j.signo}</div>
          <div class="carta-equipo">${j.equipo}</div>
          <div class="carta-numero">${j.valor}</div>
          <div class="carta-aporte">aporte: ${aporteLabel}</div>
        </div>
      </div>`;
  });
  cartasHTML+=`</div>`;
  addPaso(cartasHTML);

  // ── PASO 2: División
  const mayoriaHasAmuleto=(mayoria.nombre===amuleto);
  const minoriaHasAmuleto=(minoria.nombre===amuleto);
  addPaso(`
    <div class="paso-label">División</div>
    <div class="equipos-row">
      <div class="equipo-bloque mayoria">
        ${mayoriaHasAmuleto?`<div class="amuleto-badge">✦ amuleto</div>`:''}
        <div class="equipo-tag">Mayoría</div>
        <div class="equipo-nombre ${mayoria.nombre.toLowerCase()}">${mayoria.nombre}</div>
        <div class="equipo-count">${mayoria.jugadores.length} jugador${mayoria.jugadores.length>1?'es':''}</div>
      </div>
      <div class="equipo-bloque minoria">
        ${minoriaHasAmuleto?`<div class="amuleto-badge">✦ amuleto</div>`:''}
        <div class="equipo-tag">Minoría</div>
        <div class="equipo-nombre ${minoria.nombre.toLowerCase()}">${minoria.nombre}</div>
        <div class="equipo-count">${minoria.jugadores.length} jugador${minoria.jugadores.length>1?'es':''}</div>
      </div>
    </div>
  `);

  // ── PASO 3: Sumas
  addPaso(`
    <div class="paso-label">Sumas</div>
    <div class="sumas-row">
      <div class="suma-bloque">
        <div class="suma-tag">Mayoría · ${mayoria.nombre}</div>
        <div class="suma-val">${sumaMayoriaReal}</div>
        <div class="suma-abs">valor absoluto: ${sumaMayoria}</div>
      </div>
      <div class="suma-bloque">
        <div class="suma-tag">Minoría · ${minoria.nombre}</div>
        <div class="suma-val">${sumaMinoriaReal}</div>
        <div class="suma-abs">valor absoluto: ${sumaMinoria}</div>
      </div>
    </div>
  `);

  // ── PASO 4: Análisis
  const compara=sumaMayoria>vivos
    ?`${sumaMayoria} supera los ${vivos} jugadores vivos — el daño apunta a la Mayoría.`
    :`${sumaMayoria} no supera los ${vivos} jugadores vivos — el daño apunta a la Minoría.`;
  const dañoBase=sumaMayoria>vivos?'Mayoría':'Minoría';
  addPaso(`
    <div class="paso-label">Análisis</div>
    <div class="analisis-texto">
      Hay <strong>${vivos}</strong> jugadores vivos.<br>
      <span>${compara}</span>
    </div>
  `);

  // ── PASO 5 (opcional): Evento especial
  if(marea){
    addPaso(`<div class="evento-especial marea"><div class="evento-nombre">Marea</div><div class="evento-desc">La suma de la Mayoría es 0.<br>La Minoría recupera 2 HP.</div></div>`);
    setTimeout(sonarMarea,400);
  } else if(tornado){
    addPaso(`<div class="evento-especial tornado"><div class="evento-nombre">Tornado</div><div class="evento-desc">La Minoría supera a la Mayoría.<br>El daño se invierte.</div></div>`);
    setTimeout(sonarTornado,400);
  }

  // ── PASO FINAL: Resultado
  if(marea){
    addPaso(`<div class="resultado-final"><div class="resultado-tag">Resultado final</div><div class="resultado-recupera">+2 HP</div><div class="resultado-sub">la minoría recupera vida</div></div>`);
  } else {
    const equipoFinal=dañoFinal==='Mayoría'?mayoria.nombre:minoria.nombre;
    const claseColor=equipoFinal.toLowerCase();
    addPaso(`<div class="resultado-final"><div class="resultado-tag">Resultado final</div><div class="resultado-daño ${claseColor}">${sumaMayoria}</div><div class="resultado-sub">de daño para <em>${equipoFinal}</em> · ${dañoFinal}</div></div>`);
    setTimeout(sonarFinal,400);
  }

  // botón siguiente
  const btnSig=document.createElement('button');
  btnSig.className='btn-siguiente'; btnSig.id='btn-siguiente';
  btnSig.textContent='Siguiente';
  btnSig.addEventListener('click', avanzar);
  zona.appendChild(btnSig);

  // revelar primer paso con flip de cartas
  mostrarPaso(0);
  sonarReveal();

  // flip animado de cada carta con delay
  jugadores.forEach((j,idx)=>{
    setTimeout(()=>{
      const carta=document.getElementById(`carta-${idx}`);
      if(carta){
        carta.style.display='flex';
        requestAnimationFrame(()=>{ carta.classList.add('flipped'); });
        sonarCartaFlip(j.equipo, 0);
        // onda en posición de la carta
        const r=carta.getBoundingClientRect();
        addBgRipple(r.left+r.width/2, r.top+r.height/2,
          j.equipo==='Algas'?'80,200,160':'220,120,90');
        sparks(r.left+r.width/2, r.top+r.height/2,
          j.equipo==='Algas'?'80,200,160':'220,120,90');
      }
    }, 200+idx*150);
  });

  // scroll al botón
  setTimeout(()=>{
    const btn=document.getElementById('btn-siguiente');
    if(btn) btn.scrollIntoView({behavior:'smooth',block:'center'});
  }, 300+jugadores.length*150+400);
}

/* ============================
   CALCULAR
============================ */
document.getElementById('btnAnalizar').addEventListener('click',function(){
  if(audioCtx.state==='suspended') audioCtx.resume();
  sonarReveal();

  const cards=document.querySelectorAll('.player-card');
  const jugadores=[];
  cards.forEach(card=>{
    const equipo=card.querySelector('.sel-equipo').value;
    const signo=card.querySelector('.sel-signo').value;
    const valor=parseInt(card.querySelector('.sel-valor').value);
    const aporte=signo==='+'?valor:-valor;
    jugadores.push({equipo,signo,valor,aporte});
  });

  const vivos=jugadores.length;
  const algas=jugadores.filter(j=>j.equipo==='Algas');
  const corales=jugadores.filter(j=>j.equipo==='Corales');

  if(algas.length===0||corales.length===0){
    const zona=document.getElementById('zona-resolucion');
    zona.innerHTML=`<div class="paso-bloque visible" style="text-align:center;padding:48px 0"><div class="paso-label">Sin conflicto</div><div class="analisis-texto">Todos eligieron el mismo equipo.<br><span>La ronda se reinicia.</span></div></div>`;
    setTimeout(()=>zona.scrollIntoView({behavior:'smooth',block:'center'}),300);
    return;
  }

  const amuleto=document.getElementById('amuleto').value;
  let mayoria, minoria;
  if(algas.length>corales.length||(algas.length===corales.length&&amuleto==='Algas')){
    mayoria={nombre:'Algas',jugadores:algas};
    minoria={nombre:'Corales',jugadores:corales};
  } else {
    mayoria={nombre:'Corales',jugadores:corales};
    minoria={nombre:'Algas',jugadores:algas};
  }

  const sumaMayoriaReal=mayoria.jugadores.reduce((a,b)=>a+b.aporte,0);
  const sumaMinoriaReal=minoria.jugadores.reduce((a,b)=>a+b.aporte,0);
  const sumaMayoria=Math.abs(sumaMayoriaReal);
  const sumaMinoria=Math.abs(sumaMinoriaReal);
  const marea=sumaMayoria===0;
  const dañoBase=sumaMayoria>vivos?'Mayoría':'Minoría';
  const tornado=!marea&&sumaMinoria>sumaMayoria;
  const dañoFinal=tornado?(dañoBase==='Mayoría'?'Minoría':'Mayoría'):dañoBase;

  construirPasos(jugadores,mayoria,minoria,sumaMayoriaReal,sumaMinoriaReal,vivos,amuleto,tornado,marea,dañoFinal);
});
</script>
